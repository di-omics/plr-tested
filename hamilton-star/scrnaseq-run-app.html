<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>scRNA-seq run plan</title>
<style>
body{font:16px system-ui;max-width:920px;margin:40px auto;padding:0 20px;color:#17202a;background:#f7f9fb}
h1{margin-bottom:8px}.note{background:#fff3cd;border:1px solid #eed27a;padding:14px;border-radius:8px}
ol{display:grid;gap:9px;padding-left:32px}li{background:white;border:1px solid #d9e1e8;border-radius:8px;padding:12px}
</style></head><body>
<h1>scRNA-seq</h1>
<p>Supervised, simulation-first Hamilton/ODTC choreography.</p>
<p class="note"><strong>Public profiles are water-only motion checks.</strong> Reagent identities, volumes,
cleanup settings, and thermal methods must come from operator-approved local profiles.</p>
<ol id="flow"></ol>
<script>
const flow=[
  ...Array.from({length:3},(_,i)=>`Reagent stage ${i+1}`),"Cleanup 1","Operator checkpoint",
  ...Array.from({length:4},(_,i)=>`Reagent stage ${i+4}`),"Cleanup 2",
  ...Array.from({length:2},(_,i)=>`Reagent stage ${i+8}`),"Cleanup 3"
];
document.querySelector("#flow").innerHTML=flow.map(x=>`<li>${x} — operator configured</li>`).join("");
</script></body></html>
