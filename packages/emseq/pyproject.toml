[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "emseq-automation"
version = "0.1.0"
description = "QC-gated NEBNext EM-seq v2 automation with UltraShear on Hamilton STAR + Inheco ODTC"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "di-omics" }]
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
yaml = ["pyyaml>=5.4"]
test = ["pytest>=7"]

[project.scripts]
emseq-run = "emseq_automation.cli:main"

[tool.setuptools]
packages = ["emseq_automation"]

