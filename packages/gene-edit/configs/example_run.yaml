# example_run.yaml - the sparse input a lab writes. Everything else is supplied by the
# package's pinned defaults (deck, reagent recipes, thermal programs, QC cutoffs).
#
# Run it:   edit-confirm run configs/example_run.yaml
# or:       python -m edit_confirmation run configs/example_run.yaml

run_id: EC-2026-07-11-embryo01
operator: di
mode: simulation            # 'simulation' runs the whole flow with synthetic reads;
                            # 'hardware' drives the STAR/ODTC/Tecan and refuses to start
                            # until the reader calibration is pinned down.

edit:
  type: crispr_indel        # what we are confirming: crispr_indel | crispr_hdr |
                            # base_edit | prime_edit | unknown

locus:
  name: EMX1_site1
  target_product_bp: 250          # expected PCR1 targeted PCR product around the edit
  edit_position_bp: 125     # where the edit sits in the targeted PCR product (optional)
  # pcr1_anneal_c: 67       # optional; recompute for your primers (NEB Tm calc, Q5U)

# tip_column: 1             # site-specific: which tip-rack column to start from

samples:
  - { id: embryo_01, well: A1 }
  - { id: embryo_02, well: B1 }
  - { id: embryo_03, well: C1 }
  - { id: pos_ctrl,  well: F1, type: pos_ctrl }   # known-edited reference
  - { id: neg_ctrl,  well: G1, type: neg_ctrl }   # wild-type reference
  - { id: ntc,       well: H1, type: ntc }        # no-template contamination watch

# acceptance:               # optional overrides; omit to use the shipped standard
#   pta_yield_min_ng: 150
