[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "gene-edit"
version = "0.1.0"
description = "QC-gated whole-genome amplification + targeted PCR for confirming gene edits, standardized from sparse input and portable across labs"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "di-omics" }]
license = { text = "MIT" }
# Core is standard-library only, on purpose: it runs in any lab with any Python.
dependencies = []

[project.optional-dependencies]
# YAML manifests (JSON works without this). Hardware backends need the di-omics
# PyLabRobot fork and are installed on the Pi, not here.
yaml = ["pyyaml>=5.4"]
test = ["pytest>=7"]

[project.scripts]
edit-confirm = "edit_confirmation.cli:main"

[tool.setuptools]
packages = [
    "edit_confirmation",
    "edit_confirmation.stages",
    "edit_confirmation.instruments",
    "edit_confirmation.reagents",
    "edit_confirmation.reporting",
]
