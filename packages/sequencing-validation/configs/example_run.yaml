# example_run.yaml - a complete public water-only motion example.
# Biological runs must replace the method block with controlled operator values
# and external ODTC profile paths. No biological recipe defaults are supplied.
#
# Run it:   seq-validate run configs/example_run.yaml
# or:       python -m sequencing_validation run configs/example_run.yaml

run_id: SEQ-2026-07-11-run01
operator: di
mode: simulation            # 'simulation' runs the whole flow with synthetic reads;
                            # 'hardware' drives the STAR/ODTC/Tecan and refuses to start
                            # until the reader calibration is pinned down.

assay:
  type: variant_detection   # variant_detection | allele_confirmation |
                            # targeted_sequencing | screening | generic

target:
  name: target_region_01
  target_product_bp: 250          # expected PCR enrichment product
  position_of_interest_bp: 125    # optional coordinate for downstream analysis

method:
  profile_kind: synthetic_water
  parameter_source: public example; synthetic water motion only
  wgs_input_preparation_ul: 10
  wgs_reaction_mix_ul: 10
  wgs_odtc_profile: wgs_prep
  pcr1_mastermix_ul: 10
  pcr2_mastermix_ul: 10
  pcr_reaction_volume_ul: 20
  post_pcr1_cleanup_ratio: 1
  post_pcr2_cleanup_ratio: 1
  supernatant_margin_ul: 0
  pcr1_anneal_c: 40
  pcr2_cycles: 2
  pcr1_odtc_profile: pcr-enrichment-round1
  pcr2_odtc_profile: pcr-enrichment-round2
  wgs_qc_dilution: 1
  pcr_qc_dilution: 1
  wgs_product_volume_ul: 20
  pcr_library_volume_ul: 20
  # Synthetic reader values used only by the deterministic simulator.
  fluorescent_dsdna_excitation_nm: 400
  fluorescent_dsdna_emission_nm: 500
  fluorescent_dsdna_standards_ng_per_ml: [0, 1, 2, 3]

acceptance:
  # Demonstration gates for synthetic output only. Set every value from the
  # site's approved assay acceptance plan for an operator profile.
  lh_cv_max_percent: 5
  lh_recovery_tolerance_percent: 20
  lh_qualified_volumes_ul: [10, 20, 50, 100]
  curve_r2_min: 0.95
  wgs_prep_yield_min_ng: 50
  wgs_prep_uniformity_cv_max_percent: 50
  pcr_enrichment_conc_min_ng_per_ul: 1
  pcr_enrichment_conc_max_ng_per_ul: 100

# tip_column: 1             # site-specific: which tip-rack column to start from

samples:
  - { id: sample_01, well: A1 }
  - { id: sample_02, well: B1 }
  - { id: sample_03, well: C1 }
  - { id: pos_ctrl,  well: F1, type: pos_ctrl }   # positive reference
  - { id: neg_ctrl,  well: G1, type: neg_ctrl }   # negative reference
  - { id: ntc,       well: H1, type: ntc }        # no-template contamination watch
