[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "pta-ampseq-app"
version = "0.1.0"
description = "Planning-only local bench app for the combined PTA and AmpSeq dry workflow"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "di-omics" }]
dependencies = []

[project.scripts]
pta-ampseq-app = "pta_ampseq_app.server:main"

[tool.setuptools]
packages = ["pta_ampseq_app"]

[tool.setuptools.package-data]
pta_ampseq_app = [
  "data/*.json",
  "data/releases/*.json",
  "data/releases/*.txt",
  "static/*.html",
]
