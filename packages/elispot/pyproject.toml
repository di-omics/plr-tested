[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "elispot"
version = "0.1.0"
description = "QC-gated ELISpot automation across a plate washer, liquid handler, and spot imager, standardized from sparse input and portable across labs"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "di-omics" }]
license = { text = "MIT" }
# Core is standard-library only, on purpose: it runs in any lab with any Python.
dependencies = []

[project.optional-dependencies]
# YAML manifests (JSON works without this). Hardware backends need PyLabRobot and are
# installed on the Pi, not here.
yaml = ["pyyaml>=5.4"]
test = ["pytest>=7"]

[project.scripts]
elispot = "elispot.cli:main"

[tool.setuptools]
packages = [
    "elispot",
    "elispot.reagents",
    "elispot.instruments",
    "elispot.stages",
    "elispot.reporting",
]
