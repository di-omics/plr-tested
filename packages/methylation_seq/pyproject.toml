[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "methylation_seq-automation"
version = "0.1.0"
description = "QC-gated methylation-sequencing workflow automation with fragmentation on Hamilton STAR + Inheco ODTC"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "di-omics" }]
license = { text = "MIT" }
dependencies = []

[project.optional-dependencies]
yaml = ["pyyaml>=5.4"]
test = ["pytest>=7"]

[project.scripts]
methylation_seq-run = "methylation_seq_automation.cli:main"

[tool.setuptools]
packages = ["methylation_seq_automation"]

