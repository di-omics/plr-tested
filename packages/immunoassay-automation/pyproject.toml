[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "immunoassay"
version = "0.1.0"
description = "QC-gated ELISpot automation across a plate washer, liquid handler, and spot imager, standardized from sparse input and portable across labs"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "di-omics" }]
license = { text = "MIT" }
# Core is standard-library only, on purpose: it runs in any lab with any Python.
dependencies = []

[project.optional-dependencies]
# YAML manifests (JSON works without this). Hardware backends need PyLabRobot and are
# installed on the Pi, not here.
yaml = ["pyyaml>=5.4"]
test = ["pytest>=7"]

[project.scripts]
immunoassay = "immunoassay.cli:main"

[tool.setuptools]
packages = [
    "immunoassay",
    "immunoassay.reagents",
    "immunoassay.instruments",
    "immunoassay.stages",
    "immunoassay.reporting",
]
